<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Love My Melody 💗</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

<!-- หน้าโหลด -->
<div id="loadingPage" class="page active">

    <div class="card">

        <img src="https://i.imgur.com/Z2MYNbj.png" class="character">

        <h1>Loading...</h1>

        <p>กำลังเตรียมเซอร์ไพรส์ให้อยู่น้า 💖</p>

        <div class="progress">
            <div id="bar"></div>
        </div>

    </div>

</div>

<!-- หน้าสแกน -->
<div id="scanPage" class="page">

    <div class="card">

        <img src="https://i.imgur.com/Z2MYNbj.png" class="character">

        <h2>มีเรื่องสำคัญอยากถาม...</h2>

        <p>แตะปุ่มด้านล่างเพื่อยืนยันตัวตน</p>

        <button id="scanBtn">💗 แตะเพื่อเริ่ม</button>

    </div>

</div>

<!-- หน้าถาม -->
<div id="questionPage" class="page">

    <div class="card">

        <img src="https://i.imgur.com/Z2MYNbj.png" class="character">

        <h2>เป็นแฟนกับใบได้มั้ย้ ้ ้👉🏻👈🏻</h2>

        <p>ใบจะดูแลเอยให้ดีที่สุดเลยนะ</p>

        <div class="buttons">

            <button id="yes">เป็น </button>

            <button id="no">ไม่เป็น</button>

        </div>

    </div>

</div>

<!-- หน้าสำเร็จ -->
<div id="successPage" class="page">

    <div class="card">

        <h1>เย้ ้ ้ ้</h1>

        <h2>จากนี้เราเป็นแฟนกันแล้วนะ</h2>

        <div class="love">
            ❤️ 💗 💖 💕
        </div>

    </div>

</div>

<script src="script.js"></script>

</body>
</html>
